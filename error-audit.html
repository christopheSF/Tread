<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F1F6F9;color:#132732;font-size:14px}
.header{background:#132732;padding:24px 32px;display:flex;align-items:center;gap:20px;border-bottom:3px solid #F6CC46}
.logo{display:flex;flex-direction:column;gap:2px}
.logo-mark{font-size:10px;line-height:1.1;color:#F6CC46;font-family:monospace;white-space:pre}
.logo-text{color:#fff;font-size:22px;font-weight:700;letter-spacing:2px}
.header-meta{margin-left:auto;text-align:right}
.header-meta h1{color:#fff;font-size:18px;font-weight:600}
.header-meta p{color:#84929A;font-size:12px;margin-top:2px}
.stats-bar{background:#fff;border-bottom:1px solid #D6DDE1;padding:20px 32px;display:flex;gap:32px;align-items:center}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-value{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:#697982;text-transform:uppercase;letter-spacing:.5px}
.stat-pass .stat-value{color:#00A11A}
.stat-fail .stat-value{color:#EA1200}
.stat-total .stat-value{color:#132732}
.score-ring{width:80px;height:80px;margin-left:auto}
.controls{padding:16px 32px;background:#fff;border-bottom:1px solid #D6DDE1;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:220px;max-width:360px;border:1px solid #BBC4C9;border-radius:6px;padding:8px 12px;font-family:inherit;font-size:13px;outline:none;color:#132732}
.search-box:focus{border-color:#F6CC46;box-shadow:0 0 0 2px rgba(246,204,70,.2)}
select{border:1px solid #BBC4C9;border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;background:#fff;color:#132732;cursor:pointer;outline:none}
select:focus{border-color:#F6CC46}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;font-weight:600;padding:2px 6px;min-width:22px}
.badge-pass{background:#E6F4E8;color:#00A11A}
.badge-fail{background:#FDE8E6;color:#EA1200}
.badge-warn{background:#FFF3E0;color:#FF7A00}
.rule-pill{display:inline-flex;align-items:center;gap:3px;border-radius:3px;font-size:10px;font-weight:600;padding:2px 5px;cursor:help}
.rule-ok{background:#E6F4E8;color:#00A11A}
.rule-bad{background:#FDE8E6;color:#EA1200}
.typo-badge{background:#FFF3CD;color:#856404;font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;margin-left:4px}
table{width:100%;border-collapse:collapse}
.table-wrap{overflow-x:auto;margin:0 32px 32px;border-radius:8px;border:1px solid #D6DDE1;background:#fff}
thead th{background:#132732;color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:first-child{border-radius:8px 0 0 0}
thead th:last-child{border-radius:0 8px 0 0}
tbody tr{border-bottom:1px solid #F1F6F9;transition:background .1s}
tbody tr:hover{background:#FAFBFC}
tbody tr.expanded{background:#FAFBFC}
td{padding:10px 12px;vertical-align:top}
td.msg-text{font-size:13px;max-width:320px;line-height:1.45}
td.key-cell{font-size:10px;color:#697982;font-family:monospace;max-width:240px;word-break:break-all}
td.rules-cell{white-space:nowrap}
td.score-cell{text-align:center;font-weight:700;font-size:13px}
td.src-cell{font-size:11px;color:#697982}
.score-num{font-size:18px;font-weight:700}
.score-0,.score-1{color:#EA1200}
.score-2{color:#FF7A00}
.score-3{color:#FFAA13}
.score-4{color:#84929A}
.score-5{color:#00A11A}
.expand-btn{background:none;border:none;cursor:pointer;color:#697982;font-size:16px;padding:0 4px;line-height:1}
.expand-btn:hover{color:#132732}
.suggestions-row{display:none}
.suggestions-row.open{display:table-row}
.suggestions-cell{background:#F8FBFC;padding:12px 16px 12px 48px;border-bottom:2px solid #F6CC46}
.sugg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#697982;margin-bottom:8px}
.sugg-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.sugg-list li{display:flex;gap:8px;font-size:12px;line-height:1.5;color:#334752}
.sugg-num{min-width:18px;height:18px;border-radius:50%;background:#F6CC46;color:#132732;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sugg-text code{background:#E8ECF0;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:11px}
.category-row td{background:#F1F6F9;font-size:11px;font-weight:700;color:#697982;text-transform:uppercase;letter-spacing:.5px;padding:6px 12px;border-bottom:1px solid #D6DDE1}
.progress-bar{height:6px;border-radius:3px;background:#D6DDE1;overflow:hidden;margin-top:8px;min-width:80px}
.progress-fill{height:100%;border-radius:3px;background:#00A11A}
.count-label{font-size:11px;color:#697982;margin-top:4px}
#result-count{font-size:12px;color:#697982;margin-left:auto}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="https://tread.ai/wp-content/uploads/2025/03/Tread-Logo.svg" height="26" alt="Tread" />
  </div>
  <div class="header-meta">
    <h1>Error Message Audit</h1>
    <p>horizon-fe · horizon-api &nbsp;·&nbsp; Guidelines: Wix UX Error Message Standard &nbsp;·&nbsp; 2026-05-10</p>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat stat-total"><span class="stat-value" id="sTot">—</span><span class="stat-label">Total messages</span></div>
  <div class="stat stat-pass"><span class="stat-value" id="sPass">—</span><span class="stat-label">Passing (all 5 rules)</span></div>
  <div class="stat stat-fail"><span class="stat-value" id="sFail">—</span><span class="stat-label">Failing (≥1 rule)</span></div>
  <div class="stat"><span class="stat-value" id="sPct" style="color:#132732">—</span><span class="stat-label">Compliance %</span></div>
  <div style="margin-left:auto">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#697982;margin-bottom:6px">Rule Breakdown (failures)</div>
    <div id="ruleBreakdown" style="display:flex;gap:16px"></div>
  </div>
</div>

<div class="controls">
  <input class="search-box" id="search" placeholder="Search messages, keys, categories…" oninput="render()">
  <select id="filterSrc" onchange="render()">
    <option value="">All sources</option>
    <option value="fe">horizon-fe</option>
    <option value="api">horizon-api</option>
  </select>
  <select id="filterRule" onchange="render()">
    <option value="">All compliance</option>
    <option value="pass">Passing only</option>
    <option value="fail">Failing only</option>
    <option value="r1">Fails Rule 1 (no explanation)</option>
    <option value="r2">Fails Rule 2 (no reassurance)</option>
    <option value="r3">Fails Rule 3 (no next step)</option>
    <option value="r4">Fails Rule 4 (blame/shame)</option>
    <option value="r5">Fails Rule 5 (jargon)</option>
  </select>
  <select id="filterCat" onchange="render()">
    <option value="">All categories</option>
  </select>
  <span id="result-count"></span>
</div>

<div class="table-wrap">
<table id="mainTable">
  <thead>
    <tr>
      <th style="width:32px"></th>
      <th>Message</th>
      <th>Translation Key</th>
      <th>Src</th>
      <th>Category</th>
      <th>Rules</th>
      <th style="width:60px;text-align:center">Score</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

// ─── SCORING ────────────────────────────────────────────────────────────────
const JARGON = ['fetch','agave','stytch','kml file','kml files','kml','geojson','geo json','e.164','iam','pw benefit','pw benefits','scoped resource','scoped resources','falied','parent companyshare','driverrate','jobevents','job_state','assignmentable','salesperson_id','foreman_id','content_type'];
const FINANCIAL = ['invoice','settlement','payment','bill','rate','charge','rebill','void','export'];
const DESTRUCTIVE = ['delete','remove','cancel','void','deactivate','revoke'];

function score(m) {
  const t = m[0], l = t.toLowerCase(), k = m[1];
  let r1=1,r2=0,r3=0,r4=1,r5=1;
  // Rule 1 — explains what happened
  const tooVague = ['failed','failed.','accounting failed','email failed','unable to copy','unable to disconnect','error reading file','cannot be deleted','invalid transition','sending company is invalid'];
  if(tooVague.includes(l.trim())) r1=0;
  if(t.length < 8 && !t.includes('{')) r1=0;
  // Rule 2 — reassurance
  if(/data can be restored|data.*not.*changed|your.*unchanged|working to fix|not affected|hasn.t been/i.test(t)) r2=1;
  // Rule 3 — next step
  if(/try again|please try|contact support|check.*again|please check|request new|double check|ensure roles|add more filter|per customer|per vendor|mark.*inactive|try refreshing|before (deleting|importing)/i.test(t)) r3=1;
  // Rule 4 — blame
  if(/user.s company is not specified|cannot send.*because.*not setup/i.test(t)) r4=0;
  if(/DriverRate\.company|Account\.company|foreman_id|salesperson_id|IamPermission|assignmentable_type/i.test(t)) r4=0; // raw internal refs
  // Rule 5 — jargon
  for(const j of JARGON) { if(l.includes(j)){r5=0;break;} }
  return {r1,r2,r3,r4,r5,total:r1+r2+r3+r4+r5};
}

const TYPO_KEYS = ['falied_to_fetch_resource_usage_logs'];

function isTypo(m) { return TYPO_KEYS.some(t => m[1].includes(t)); }

// ─── SUGGESTIONS ────────────────────────────────────────────────────────────
function suggestions(m, sc) {
  const t = m[0], l = t.toLowerCase();
  const isFailedTo = t.startsWith('Failed to ');
  const hasFetch = l.includes('fetch');
  const hasAgave = l.includes('agave');
  const hasStytch = l.includes('stytch');
  const hasKml   = l.includes('kml');
  const hasGeoJson = l.includes('geo json') || l.includes('geojson');
  const hasE164  = l.includes('e.164');
  const hasPW    = l.includes('pw ') || l.includes('pw benefit');
  const hasIam   = l.includes('iampermission') || l.includes('iam');
  const isFinancial = FINANCIAL.some(k => l.includes(k));
  const isDestructive = DESTRUCTIVE.some(k => l.includes(k));
  const isSend   = l.includes('send') || l.includes('email');
  const isSystem = l.includes('something went wrong') || l.includes('alerted');
  const suggs = [];

  // S1: tone / framing
  if(isFailedTo) {
    const action = t.replace('Failed to ','').replace(/\.$/,'');
    suggs.push(`Reframe as <code>Couldn't ${action}</code> — softer and more natural than "Failed to".`);
  } else if(['failed','failed.','accounting failed','email failed'].includes(l.trim())) {
    suggs.push(`Single-word label tells users nothing. Replace with the specific action: e.g. <code>Export to accounting failed</code> or <code>Email delivery failed</code>.`);
  } else if(l.startsWith('unable to')) {
    const action = t.replace(/^Unable to /i,'');
    suggs.push(`Replace <code>Unable to ${action}</code> with <code>Couldn't ${action}</code> — more conversational and less robotic.`);
  } else if(l.startsWith('error ')) {
    suggs.push(`"Error" is vague — name the specific situation: <code>Couldn't read this file</code> is clearer than "Error reading file".`);
  } else {
    suggs.push(`The opening framing is good. Consider adding the impacted entity to the title so users immediately know what's affected.`);
  }

  // S2: jargon
  if(hasFetch) {
    suggs.push(`<code>fetch</code> is developer jargon. Replace with <code>load</code>: "<code>${t.replace(/[Ff]etch/g,'load').replace('Failed to',"Couldn't")}</code>".`);
  } else if(hasAgave) {
    suggs.push(`"Agave" is an internal integration service name users don't see. Replace with <code>your accounting integration</code> throughout.`);
  } else if(hasStytch) {
    suggs.push(`"stytch" is an internal auth service — never expose it. Replace with: <code>Email sign-in isn't configured for this company. Contact your admin.</code>`);
  } else if(hasKml) {
    suggs.push(`"KML" is a technical file format name. Replace with <code>map file</code> for non-technical users.`);
  } else if(hasGeoJson) {
    suggs.push(`"GeoJSON" / "geo json" is developer jargon. Replace with <code>map boundary</code> or <code>boundary shape</code>.`);
  } else if(hasE164) {
    suggs.push(`"E.164" is a technical standard — users won't recognise it. Replace with: <code>Enter a valid phone number with country code (e.g. +1 555 000 0000)</code>.`);
  } else if(hasPW) {
    suggs.push(`"PW" abbreviation is ambiguous. Spell out <code>prevailing wage benefit</code> in full — new users won't know the shorthand.`);
  } else if(hasIam) {
    suggs.push(`"IamPermission" is an internal permission model term. Replace with a plain description: <code>This account doesn't have impersonation access</code>.`);
  } else if(/DriverRate\.|Account\.|foreman_id|salesperson_id|assignmentable_type|JobEvents|companyshare|job_state/i.test(t)) {
    suggs.push(`This message contains an internal model/field name (<code>${t.match(/[A-Z][a-z]+[A-Z]\w+|_id\b|\w+_type\b/)?.[0]||'internal term'}</code>). Rewrite entirely in plain English without referencing database fields.`);
  } else {
    suggs.push(`No jargon detected. Still verify that business terms like "settlement", "phase", or "geofence" are explained with tooltips for first-time users.`);
  }

  // S3: next step
  if(!sc.r3) {
    if(isDestructive) {
      suggs.push(`Destructive action errors need a recovery path. Add: <code>Nothing was deleted. Please try again, or contact support if this keeps happening.</code>`);
    } else if(isFinancial) {
      suggs.push(`Financial errors create anxiety. Add reassurance and a path forward: <code>Your data hasn't changed. Please try again or contact support.</code>`);
    } else if(isSend) {
      suggs.push(`Confirm nothing was sent and give a retry path: <code>Nothing was sent. Check your connection and try again.</code>`);
    } else if(hasFetch || l.includes('load')) {
      suggs.push(`Add a retry hint: <code>Try refreshing the page. If the problem continues, contact support.</code>`);
    } else {
      suggs.push(`This is a dead end — users don't know what to do next. Add at minimum: <code>Please try again.</code> Better: explain what to check first.`);
    }
  } else {
    suggs.push(`Good — a next step is present. Consider making it more specific: link directly to the relevant action or setting rather than a generic retry.`);
  }

  // S4: reassurance
  if(isDestructive || isFinancial) {
    suggs.push(`Reassure the user their data is safe: append <code>Your data hasn't been changed.</code> Users fear accidental data loss when errors occur on destructive or financial actions.`);
  } else if(isSend) {
    suggs.push(`Confirm nothing left the system: <code>The message/invoice wasn't sent. Nothing left your account.</code> Prevents users from worrying about duplicates.`);
  } else if(isSystem) {
    suggs.push(`System errors should confirm no data was lost: <code>Your work has been saved. We're looking into it.</code> This prevents users from trying to recreate work.`);
  } else {
    suggs.push(`Even non-destructive errors benefit from reassurance. A brief <code>Your previous data is unchanged</code> reduces anxiety and builds trust in the platform.`);
  }

  // S5: escape route
  if(isSystem || l.includes('alerted')) {
    suggs.push(`System errors must include a direct support escape route — add a <code>Contact support</code> link. Consider surfacing an error reference code so support can look up the incident.`);
  } else if(isFinancial) {
    suggs.push(`For financial errors, always offer a support path: <code>If this keeps happening, contact support at support@tread.io</code> — billing issues left unresolved erode trust fast.`);
  } else {
    suggs.push(`Add a support escape route for persistent failures: <code>If this keeps happening, contact support.</code> Even a mailto link removes the feeling of being stuck.`);
  }

  return suggs;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const q     = document.getElementById('search').value.toLowerCase();
  const fSrc  = document.getElementById('filterSrc').value;
  const fRule = document.getElementById('filterRule').value;
  const fCat  = document.getElementById('filterCat').value;

  const scored = MSGS.map((m,i)=>({m,i,sc:score(m)}));
  const filtered = scored.filter(({m,sc})=>{
    if(fSrc && m[2]!==fSrc) return false;
    if(fCat && m[3]!==fCat) return false;
    if(fRule==='pass' && sc.total<5) return false;
    if(fRule==='fail' && sc.total===5) return false;
    if(fRule==='r1' && sc.r1===1) return false;
    if(fRule==='r2' && sc.r2===1) return false;
    if(fRule==='r3' && sc.r3===1) return false;
    if(fRule==='r4' && sc.r4===1) return false;
    if(fRule==='r5' && sc.r5===1) return false;
    if(q && !m[0].toLowerCase().includes(q) && !m[1].toLowerCase().includes(q) && !m[3].toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('result-count').textContent = `Showing ${filtered.length} of ${MSGS.length}`;

  let html='', lastCat='';
  filtered.forEach(({m,i,sc})=>{
    if(m[3]!==lastCat){
      html+=`<tr class="category-row"><td colspan="7">${m[3]}</td></tr>`;
      lastCat=m[3];
    }
    const ruleHtml = ['r1','r2','r3','r4','r5'].map((r,ri)=>
      `<span class="rule-pill ${sc[r]?'rule-ok':'rule-bad'}" title="Rule ${ri+1}: ${['Explains what/why','Provides reassurance','Enables solution','No blame','No jargon'][ri]}">${sc[r]?'✓':'✗'} R${ri+1}</span>`
    ).join(' ');
    const sc_class = `score-${sc.total}`;
    const typo = isTypo(m)?`<span class="typo-badge" title="Key name has a typo">TYPO</span>`:'';
    const pct = Math.round(sc.total/5*100);
    const badge = sc.total===5
      ? `<span class="badge badge-pass">${pct}%</span>`
      : sc.total>=3
        ? `<span class="badge badge-warn">${pct}%</span>`
        : `<span class="badge badge-fail">${pct}%</span>`;
    html+=`
    <tr id="row-${i}" onclick="toggle(${i})">
      <td><button class="expand-btn" id="btn-${i}">▶</button></td>
      <td class="msg-text">${escHtml(m[0])} ${typo}</td>
      <td class="key-cell">${escHtml(m[1])}</td>
      <td class="src-cell">${m[2]}</td>
      <td class="src-cell">${m[3]}</td>
      <td class="rules-cell">${ruleHtml}</td>
      <td class="score-cell"><span class="score-num ${sc_class}">${sc.total}/5</span><br>${badge}</td>
    </tr>
    <tr class="suggestions-row" id="sugg-${i}">
      <td colspan="7" class="suggestions-cell">
        <div class="sugg-title">5 Improvement Suggestions</div>
        <ul class="sugg-list">
          ${suggestions(m,sc).map((s,si)=>`<li><span class="sugg-num">${si+1}</span><span class="sugg-text">${s}</span></li>`).join('')}
        </ul>
      </td>
    </tr>`;
  });

  document.getElementById('tbody').innerHTML=html;
  updateStats();
}

function toggle(i){
  const row=document.getElementById(`sugg-${i}`);
  const btn=document.getElementById(`btn-${i}`);
  const open=row.classList.contains('open');
  row.classList.toggle('open',!open);
  btn.textContent=open?'▶':'▼';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateStats(){
  const all=MSGS.map(m=>score(m));
  const pass=all.filter(s=>s.total===5).length;
  const fail=all.length-pass;
  const pct=Math.round(pass/all.length*100);
  document.getElementById('sTot').textContent=all.length;
  document.getElementById('sPass').textContent=pass;
  document.getElementById('sFail').textContent=fail;
  document.getElementById('sPct').textContent=pct+'%';

  const ruleNames=['Explains what','Reassurance','Next step','No blame','No jargon'];
  const ruleKeys=['r1','r2','r3','r4','r5'];
  const ruleBreak=document.getElementById('ruleBreakdown');
  ruleBreak.innerHTML=ruleKeys.map((r,ri)=>{
    const fails=all.filter(s=>s[r]===0).length;
    const pct2=Math.round(fails/all.length*100);
    return `<div style="text-align:center">
      <div style="font-size:16px;font-weight:700;color:${pct2>50?'#EA1200':pct2>20?'#FF7A00':'#00A11A'}">${pct2}%</div>
      <div style="font-size:10px;color:#697982">R${ri+1} ${ruleNames[ri]}</div>
    </div>`;
  }).join('');
}

function buildCatFilter(){
  const cats=[...new Set(MSGS.map(m=>m[3]))].sort();
  const sel=document.getElementById('filterCat');
  cats.forEach(c=>{
    const o=document.createElement('option');
    o.value=c; o.textContent=c;
    sel.appendChild(o);
  });
}

buildCatFilter();
render();
