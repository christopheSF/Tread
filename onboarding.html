<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tread — Client Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A1820;
      --card:     #132732;
      --card2:    #1A3244;
      --accent:   #FFE500;
      --accent-d: #D4BE00;
      --orange:   #FFAA13;
      --text:     #FFFFFF;
      --muted:    #84929A;
      --dim:      #BBC4C9;
      --border:   rgba(255,255,255,0.08);
      --danger:   #FF0E4A;
      --success:  #33CF77;
      --radius:   12px;
      --radius-sm:6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px calc(40px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 20px 0 14px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--accent); }

    .header-sub {
      font-size: 13px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Progress bar ────────────────────────────────────── */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      text-align: right;
    }

    /* ── Chat container ──────────────────────────────────── */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 8px;
    }

    /* ── Message rows ────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeUp .3s ease both;
    }

    .msg-row.bot  { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--bg);
    }

    .bubble {
      max-width: 80%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.6;
    }

    .bot .bubble {
      background: var(--card);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .user .bubble {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ────────────────────────────────── */
    .typing-row { display: flex; gap: 10px; align-items: center; animation: fadeUp .2s ease both; }

    .typing-bubble {
      background: var(--card);
      padding: 12px 16px;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: flex; gap: 5px; align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Text input ─────────────────────────────────────── */
    .input-wrap {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
      animation: fadeUp .35s ease both;
    }

    .text-input {
      flex: 1;
      max-width: 380px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 11px 15px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }

    .text-input::placeholder { color: var(--muted); }

    .text-input:focus { border-color: var(--accent); }

    .text-input.error { border-color: var(--danger); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 11px 20px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .send-btn:hover  { opacity: .88; }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { opacity: .35; cursor: default; }

    @media (max-width: 640px) {
      .input-wrap { flex-direction: column; align-items: stretch; }
      .text-input { max-width: 100%; font-size: 16px; }
      .send-btn   { font-size: 16px; min-height: 48px; }
    }

    /* ── Quick-reply options ─────────────────────────────── */
    .options-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
      animation: fadeUp .35s ease both;
    }

    .option-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 99px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      white-space: normal;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn:hover {
      border-color: var(--accent);
      background: rgba(255,229,0,.08);
      transform: translateY(-1px);
    }

    .option-btn:active { transform: translateY(0); }

    /* ── Summary screen ──────────────────────────────────── */
    #summary {
      display: none;
      flex-direction: column;
      gap: 24px;
      padding-top: 8px;
      animation: fadeUp .4s ease both;
    }

    #summary.visible { display: flex; }

    .summary-hero {
      background: linear-gradient(135deg, var(--card2) 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .summary-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255,229,0,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .hero-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      background: rgba(255,229,0,.12);
      border: 1px solid rgba(255,229,0,.3);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Checklist section ───────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      transition: border-color .15s;
    }

    .check-item:hover { border-color: rgba(255,229,0,.3); }

    .check-num {
      width: 24px; height: 24px;
      background: rgba(255,229,0,.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .check-content { flex: 1; }

    .check-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .check-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .check-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 7px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      opacity: .9;
      transition: opacity .15s;
    }

    .check-link:hover { opacity: 1; text-decoration: underline; }

    /* ── Watch out section ───────────────────────────────── */
    .warnings {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .warn-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: rgba(255,107,107,.06);
      border: 1px solid rgba(255,107,107,.2);
      border-radius: var(--radius-sm);
      padding: 13px 15px;
    }

    .warn-icon {
      font-size: 16px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .warn-text {
      font-size: 13.5px;
      color: #ffbaba;
      line-height: 1.5;
    }

    .warn-text strong { color: #ff9090; }

    /* ── Doc cards ───────────────────────────────────────── */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .doc-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color .15s, transform .15s;
    }

    .doc-card:hover {
      border-color: rgba(255,229,0,.4);
      transform: translateY(-2px);
    }

    .doc-card-icon { font-size: 18px; margin-bottom: 4px; }

    .doc-card-title {
      font-size: 13px;
      font-weight: 600;
    }

    .doc-card-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Start over btn ──────────────────────────────────── */
    .start-over-btn {
      align-self: center;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 10px 24px;
      border-radius: 99px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      margin-top: 8px;
    }

    .start-over-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      width: 100%;
    }

    /* ── Section break ──────────────────────────────────── */
    .section-break {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0 2px;
      animation: fadeUp .3s ease both;
    }

    .section-break::before,
    .section-break::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-break-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Congrats bubble ─────────────────────────────────── */
    .congrats-card {
      background: linear-gradient(135deg, #0D3D22 0%, #0D2A1A 100%);
      border: 1px solid rgba(51,207,119,.35);
      border-radius: var(--radius);
      padding: 20px 22px;
      animation: fadeUp .4s ease both;
      text-align: center;
    }

    .congrats-icon { font-size: 36px; margin-bottom: 8px; }

    .congrats-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 6px;
    }

    .congrats-sub {
      font-size: 14px;
      color: #9de8bc;
      line-height: 1.55;
    }

    /* ── Video section ──────────────────────────────────────── */
    .video-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .video-intro {
      font-size: 14px;
      color: var(--dim);
      line-height: 1.55;
    }

    .video-intro strong {
      color: var(--text);
      font-weight: 600;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── Confetti canvas ─────────────────────────────────── */
    #cfv {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none; display: none;
    }

    /* ── Celebration overlay ─────────────────────────────── */
    #celebration {
      position: fixed; inset: 0; z-index: 150;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
      background: var(--bg);
    }
    #celebration.active { display: flex; }
    #celebration.fade-out { animation: celFade .5s ease forwards; }
    @keyframes celFade { to { opacity: 0; pointer-events: none; } }
    .cel-ring {
      width: 96px; height: 96px; margin: 0 auto 28px;
      background: rgba(51,207,119,.12); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: popRing .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popRing { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .cel-ring svg { width: 46px; height: 46px; }
    .cel-h {
      font-size: clamp(36px,7vw,60px); font-weight: 800;
      letter-spacing: -2px; color: var(--text);
      animation: celRise .5s .15s ease both;
    }
    .cel-sub {
      font-size: 17px; font-weight: 300; color: var(--dim);
      margin-top: 10px; animation: celRise .5s .25s ease both;
    }
    @keyframes celRise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* ── Scroll anchor ───────────────────────────────────── */
    #scroll-anchor { height: 1px; }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 640px) {
      .bubble { max-width: 90%; }

      /* Stack options vertically full-width — easier thumb taps */
      .options-wrap {
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
      }

      .option-btn {
        font-size: 16px; /* prevents iOS auto-zoom on focus */
        padding: 14px 18px;
        min-height: 48px;
        border-radius: 12px;
        text-align: left;
        width: 100%;
      }

      .hero-title { font-size: 19px; }
      .summary-hero { padding: 18px; }
      .check-item { padding: 12px 14px; gap: 12px; }
      .doc-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 380px) {
      .doc-grid { grid-template-columns: 1fr; }
    }

    /* ── Learn-more links under bot bubbles ─────────────────── */
    .bubble .learn-link {
      display: inline-block;
      margin-top: 8px;
      color: var(--accent);
      font-size: 12.5px;
      font-weight: 600;
      text-decoration: none;
    }
    .bubble .learn-link:hover { text-decoration: underline; }

    /* ── Skip button for optional inputs ────────────────────── */
    .skip-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .skip-btn:hover { color: var(--dim); border-color: rgba(255,255,255,0.2); }

    /* ── Mode badge ─────────────────────────────────────────── */
    .mode-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 100px;
      margin-left: 10px;
      background: rgba(255,170,19,0.14);
      color: var(--orange);
      border: 1px solid rgba(255,170,19,0.3);
    }

    /* ── Success stories ────────────────────────────────────── */
    .story-item {
      display: flex;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .story-icon { font-size: 20px; flex-shrink: 0; }
    .story-text { font-size: 13.5px; color: var(--dim); }
    .story-text strong { color: var(--text); }

    /* ── Future card ────────────────────────────────────────── */
    .future-card {
      background: linear-gradient(135deg, rgba(255,229,0,0.06), rgba(255,229,0,0.015));
      border: 1px solid rgba(255,229,0,0.18);
      border-radius: var(--radius);
      padding: 16px 18px;
      font-size: 13.5px;
      color: var(--dim);
    }
    .future-card strong { color: var(--text); }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;">
        <img src="https://tread.ai/wp-content/uploads/2025/03/Tread-Logo.svg" height="22" alt="Tread" />
      </a>
      <span class="header-sub" id="step-label" style="font-size:12px;color:var(--muted);margin-left:auto;">Step 1 of 16</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Summary (hidden until end) -->
  <div id="summary"></div>

  <div id="scroll-anchor"></div>
</div>

<canvas id="cfv"></canvas>
<div id="celebration">
  <div class="cel-ring">
    <svg viewBox="0 0 46 46" fill="none">
      <path d="M10 23l9 9L36 14" stroke="#33CF77" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h2 class="cel-h">You're all set! 🎉</h2>
  <p class="cel-sub">Preparing your personalised setup plan…</p>
</div>

<script>
(function () {
  'use strict';

  /*
   * ── DATABASE CONFIG ──────────────────────────────────────
   *
   * Responses are saved to this Google Sheet:
   *   https://docs.google.com/spreadsheets/d/13W9RbK5O5bUIiJaC6HFSU3nBDY5JlJrhDcssK3LXFkk/edit
   *
   * Customer responses land on the "Customer Responses" tab;
   * sales-assisted responses (onboarding.html?mode=sales, or
   * onboarding-sales.html) land on "Sales Responses".
   *
   * The Apps Script web app on that sheet must route by mode.
   * Open the sheet → Extensions → Apps Script, replace the code with:
   *
   *   function doPost(e) {
   *     var d = JSON.parse(e.postData.contents);
   *     var ss = SpreadsheetApp.getActiveSpreadsheet();
   *     var tab = d.mode === 'sales' ? 'Sales Responses' : 'Customer Responses';
   *     var HEADERS = ['timestamp','mode','repName','company','email',
   *       'successGoal','dispatchSetup','dispatchNumbers','billingNumbers',
   *       'materialLinking','fieldCapture','approvalFlow','billingCadence',
   *       'accounting','billingFiles','telematics','timeline'];
   *     var sheet = ss.getSheetByName(tab);
   *     if (!sheet) { sheet = ss.insertSheet(tab); sheet.appendRow(HEADERS); }
   *     sheet.appendRow(HEADERS.map(function (h) { return d[h] || ''; }));
   *     return ContentService
   *       .createTextOutput(JSON.stringify({status:'ok'}))
   *       .setMimeType(ContentService.MimeType.JSON);
   *   }
   *
   * Then Deploy → Manage deployments → edit the existing deployment →
   * New version → Deploy. Editing in place keeps the ENDPOINT URL below valid.
   */
  const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyS_ekY8MR2Wp_BhqYjDHOzQrt6ON9yDmGs84xobsIbNoboMCsNGU9teKBcGAUwV6BdGA/exec';

  /* ── Mode ───────────────────────────────────────────────── */
  const IS_SALES = new URLSearchParams(location.search).get('mode') === 'sales';
  if (IS_SALES) {
    document.title = 'Tread — Sales Hand-off';
    const logoRow = document.querySelector('.logo-row a');
    if (logoRow) {
      const badge = document.createElement('span');

  /* ── DOM helpers ────────────────────────────────────────── */
  const chat    = document.getElementById('chat');

  const fill    = document.getElementById('progress-fill');
  const stepLbl = document.getElementById('step-label');

  function scrollDown () {
    setTimeout(() => {
      try { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
      catch (e) { window.scrollTo(0, document.body.scrollHeight); }
    }, 50);
  }

  function updateProgress (step) {
    const pct = Math.round((step / questions.length) * 100);
    fill.style.width = pct + '%';
    if (step < questions.length) {
      const sec = questions[step].section;
      stepLbl.textContent = sec
        ? `${sec} · Step ${step + 1} of ${questions.length}`
        : `Step ${step + 1} of ${questions.length}`;
    } else {
      stepLbl.textContent = IS_SALES ? 'Hand-off Pack Ready' : 'Setup Plan Ready';
    }
  }

  /* ── Typing indicator ───────────────────────────────────── */
  function showTyping () {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `<div class="avatar">T</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chat.appendChild(row);
    scrollDown();
  }

  function removeTyping () {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  /* ── Bot message (with optional learn-more link) ────────── */
  function addBotMessage (text, learn) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const learnHtml = learn
      ? `<br><a class="learn-link" href="${learn.href}" target="_blank" rel="noopener">📖 ${learn.text} →</a>`
      : '';
    row.innerHTML = `<div class="avatar">T</div><div class="bubble">${text.replace(/\n/g, '<br>')}${learnHtml}</div>`;
    chat.appendChild(row);
    scrollDown();
  }

  /* ── User bubble ────────────────────────────────────────── */
  function addUserBubble (label) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const safe = label.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    row.innerHTML = `<div class="bubble">${safe}</div>`;
    chat.appendChild(row);
    scrollDown();
  }

  /* ── Option buttons ─────────────────────────────────────── */
  function addOptions (q, onSelect) {
    const wrap = document.createElement('div');
    wrap.className = 'options-wrap';
    wrap.id = 'options-current';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = opt.sub
        ? `${opt.label}<span style="opacity:.6;font-size:12px;display:block;font-weight:400;margin-top:2px">${opt.sub}</span>`
        : opt.label;
      btn.addEventListener('click', () => { wrap.remove(); onSelect(opt); });
      wrap.appendChild(btn);
    });
    chat.appendChild(wrap);
    scrollDown();
  }

  /* ── Text / email input (supports optional → Skip) ──────── */
  function addTextInput (q, onSubmit) {
    const wrap = document.createElement('div');
    wrap.className = 'input-wrap';
    wrap.id = 'input-current';

    const input = document.createElement('input');
    input.type        = q.type === 'email' ? 'email' : 'text';
    input.placeholder = q.placeholder || '';
    input.className   = 'text-input';
    input.autocomplete = q.type === 'email' ? 'email' : 'organization';

    const btn = document.createElement('button');
    btn.className = 'send-btn';
    btn.textContent = 'Continue →';

    function attempt () {
      const val = input.value;
      if (q.validate && !q.validate(val)) {
        input.classList.add('error');
        input.placeholder = q.errorMsg || 'Please fill this in.';
        input.value = '';
        input.focus();
        return;
      }
      input.classList.remove('error');
      wrap.remove();
      onSubmit(val.trim());
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    input.addEventListener('input',   () => input.classList.remove('error'));

    wrap.appendChild(input);
    wrap.appendChild(btn);

    if (q.optional) {
      const skip = document.createElement('button');
      skip.className = 'skip-btn';
      skip.textContent = 'Skip';
      skip.addEventListener('click', () => { wrap.remove(); onSubmit(''); });
      wrap.appendChild(skip);
    }

    chat.appendChild(wrap);
    setTimeout(() => input.focus(), 350);
    scrollDown();
  }

  /* ── Section break divider ──────────────────────────────── */
  function addSectionBreak (label) {
    const el = document.createElement('div');
    el.className = 'section-break';
    el.innerHTML = `<span class="section-break-label">${label}</span>`;
    chat.appendChild(el);
  }

  /* ── Ask a question ─────────────────────────────────────── */
  function askQuestion (index) {
    if (index >= questions.length) { showSummary(); return; }
    updateProgress(index);
    const q = questions[index];

    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      addSectionBreak(q.section);
    }

    showTyping();
    setTimeout(() => {
      removeTyping();
      addBotMessage(q.text, q.learn);

      if (q.type === 'text' || q.type === 'email') {
        addTextInput(q, val => {
          answers[q.key] = val;
          addUserBubble(val === '' ? '(skipped)' : val);
          currentQ++;
          askQuestion(currentQ);
        });
      } else {
        addOptions(q, opt => {
          answers[q.key] = opt.value;
          addUserBubble(opt.label.replace(/<[^>]*>/g, '').trim());
          currentQ++;
          askQuestion(currentQ);
        });
      }
    }, 700);
  }

  /* ── Save to database ───────────────────────────────────── */
  function saveToSheet (payload) {
    if (!ENDPOINT) return;
    // text/plain is CORS-safelisted → no preflight, no-cors works cleanly.
    fetch(ENDPOINT, {
      method: 'POST',
      mode:   'no-cors',
      body:   new Blob([JSON.stringify(payload)], { type: 'text/plain' }),
    }).catch(() => {});
  }

      });
    }
    if (a.timeline === 'asap') {
      warnings.push({
        icon: '⏱️',
        html: '<strong>Tight timeline.</strong> With a 2-week target: dispatch and field capture first, integrations second. Your Tread rep can help triage.',
      });
    }
    if (warnings.length < 3 && (a.approvalFlow === 'billing_only' || a.approvalFlow === 'unsure')) {
      warnings.push({
        icon: '✅',
        html: '<strong>Approvals are the gate between field data and clean invoices.</strong> Decide who approves what before the first live dispatch — retro-approving a backlog is painful.',
      });
    }

    /* --- Success stories --- */
    const stories = [
      { icon: '📋', html: '<strong>Dispatch in minutes, not hours.</strong> The day\'s orders come off standing Projects — nobody rebuilds the board from a whiteboard each morning.' },
      { icon: '🎫', html: '<strong>Field data the same day.</strong> Tickets and hours photographed in the field are in an approval queue before the trucks are parked.' },
      { icon: '💵', html: '<strong>Billing without the chase.</strong> Approved loads roll into invoices and pay statements on your cadence — the end-of-month Excel shuffle disappears.' },
    ];

    /* --- The future --- */
    const future = 'Tread\'s AI agents already chase missing tickets by text and review loads before approval — and more of this workflow will run itself over time: less chasing, less retyping, more of the day handled before you look at it. <strong>Ask your Tread rep for the current roadmap.</strong>';

    /* --- Doc cards --- */
    const docs = [];
    docs.push({ icon: '🚀', title: 'Get Started', sub: '5-minute tour', href: DOCS + '/workflows/get-started-in-5-minutes-web' });
    docs.push({ icon: '📦', title: 'Master Data', sub: 'Data overview', href: DOCS + '/onboarding/master-data/overview' });
    docs.push({ icon: '📋', title: 'Projects & Orders', sub: 'Dispatch setup', href: DOCS + '/workflows/create-a-project' });
    docs.push({ icon: '🎫', title: 'Digital Tickets', sub: 'Field capture', href: DOCS + '/specialized/digital-tickets' });
    docs.push({ icon: '✅', title: 'Approvals', sub: 'Foreman flow', href: DOCS + '/workflows/foreman-approval-flow-sign-off-on-driver-hours' });
    docs.push({ icon: '💰', title: 'Settlements', sub: 'Pay & invoices', href: DOCS + '/concepts/settlements-driver-pay' });
    if (a.accounting === 'quickbooks') docs.push({ icon: '🔢', title: 'QuickBooks', sub: 'Integration', href: DOCS + '/integrations/quickbooks' });
    if (a.accounting === 'sage') docs.push({ icon: '🔢', title: 'Sage', sub: 'Integration', href: DOCS + '/integrations/sage' });
    if (a.accounting === 'vista') docs.push({ icon: '🔢', title: 'Vista', sub: 'Integration', href: DOCS + '/integrations/vista' });
    if (a.accounting === 'foundation_spectrum') docs.push({ icon: '🔢', title: 'Foundation', sub: 'Integration', href: DOCS + '/integrations/foundation' });
    docs.push({ icon: '📤', title: 'Exports & Reports', sub: 'Billing files', href: DOCS + '/workflows/exports-reports' });
    if (a.telematics !== 'none_gps') docs.push({ icon: '📡', title: 'Telematics', sub: 'GPS via Catena', href: DOCS + '/integrations/telematics' });
    docs.push({ icon: '📱', title: 'Driver App', sub: 'Mobile guide', href: DOCS + '/mobile/driver-app' });
    docs.push({ icon: '✔️', title: 'Go-Live Checklist', sub: 'Final validation', href: DOCS + '/onboarding/go-live-checklist' });

    return { steps, warnings, stories, future, docs, timeStr };
  }

  /* ── Confetti ───────────────────────────────────────────── */
  const cfv = document.getElementById('cfv');
  const cfCtx = cfv.getContext('2d');
  const celebrationEl = document.getElementById('celebration');
  let cfPieces = [], cfRaf = null, cfLive = false;
  const CF_COLS = ['#FFE500','#33CF77','#FF8A4C','#4DA3F5','#FF5E9B','#FFFFFF','#FF3A6E'];

  function launchConfetti() {
    cfv.width = innerWidth; cfv.height = innerHeight;
    cfv.style.display = 'block';
    cfLive = true; cfPieces = [];
    for (let i = 0; i < 140; i++) cfPieces.push({
      x: Math.random() * cfv.width,
      y: Math.random() * cfv.height - cfv.height,
      w: Math.random() * 10 + 5, h: Math.random() * 5 + 3,
      c: CF_COLS[Math.floor(Math.random() * CF_COLS.length)],
      r: Math.random() * Math.PI * 2, rs: (Math.random() - .5) * .14,
      vx: (Math.random() - .5) * 2.5, vy: Math.random() * 3 + 1.8,
      op: 1,
    });
    cfTick();
    setTimeout(() => { cfLive = false; }, 3000);
  }

  function killConfetti() {
    cfLive = false;
    setTimeout(() => { cfv.style.display = 'none'; if (cfRaf) cancelAnimationFrame(cfRaf); }, 1200);
  }

  function cfTick() {
    cfCtx.clearRect(0, 0, cfv.width, cfv.height);
    let any = false;
    cfPieces.forEach(p => {
      if (p.y < cfv.height + 20) any = true;
      p.x += p.vx; p.y += p.vy; p.r += p.rs;
      if (!cfLive) p.op = Math.max(0, p.op - .018);
      cfCtx.save();
      cfCtx.translate(p.x, p.y); cfCtx.rotate(p.r);
      cfCtx.globalAlpha = p.op; cfCtx.fillStyle = p.c;
      cfCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      cfCtx.restore();
    });
    if (any || cfLive) cfRaf = requestAnimationFrame(cfTick); else cfv.style.display = 'none';
  }

  window.addEventListener('resize', () => { cfv.width = innerWidth; cfv.height = innerHeight; });

  /* ── Render summary screen ──────────────────────────────── */
  function showSummary () {
    updateProgress(questions.length);

    const typingEl = document.getElementById('typing-indicator');
    if (typingEl) typingEl.remove();

    // Save to Google Sheet — mode routes to the right tab
    saveToSheet({
      timestamp:       new Date().toISOString(),
      mode:            IS_SALES ? 'sales' : 'customer',
      repName:         answers.repName        || '',
      company:         answers.company        || '',
      email:           answers.email          || '',
      successGoal:     answers.successGoal    || '',
      dispatchSetup:   answers.dispatchSetup  || '',
      dispatchNumbers: answers.dispatchNumbers|| '',
      billingNumbers:  answers.billingNumbers || '',
      materialLinking: answers.materialLinking|| '',
      fieldCapture:    answers.fieldCapture   || '',
      approvalFlow:    answers.approvalFlow   || '',
      billingCadence:  answers.billingCadence || '',
      accounting:      answers.accounting     || '',
      billingFiles:    answers.billingFiles   || '',
      telematics:      answers.telematics     || '',
      timeline:        answers.timeline       || '',
    });

    // Full-screen celebration + confetti
    celebrationEl.classList.add('active');
    launchConfetti();
    setTimeout(() => {
      celebrationEl.classList.add('fade-out');
      setTimeout(() => {
        celebrationEl.classList.remove('active', 'fade-out');
        killConfetti();
      }, 500);
    }, 2200);

    showTyping();
    setTimeout(() => {
      removeTyping();
      addBotMessage(IS_SALES
        ? `All captured! Generating the hand-off pack for ${answers.company || 'the customer'} now 🎯`
        : `Perfect, ${answers.company ? answers.company.split(' ')[0] : 'there'}! I have everything I need. Generating your personalised setup plan now! 🎉`);

      setTimeout(() => {
        const name = answers.company ? answers.company.split(' ')[0] : 'there';
        const congratsEl = document.createElement('div');
        congratsEl.className = 'congrats-card';
        congratsEl.innerHTML = IS_SALES
          ? `
          <div class="congrats-icon">🎯</div>
          <div class="congrats-title">Hand-off captured</div>
          <div class="congrats-sub">
            Saved to the Sales Responses sheet${answers.repName ? ` for ${answers.repName}` : ''}.
            Every question you just answered is one the customer will ask — if any felt shaky, that's the prep list before kickoff.
          </div>`
          : `
          <div class="congrats-icon">🎉</div>
          <div class="congrats-title">You've completed Step 1 of your onboarding!</div>
          <div class="congrats-sub">
            Great work, ${name}. Your answers have been saved and your personalised setup plan is ready below.
            This is the first step toward getting your team dispatching on Tread — you're off to a great start.
          </div>`;
        chat.appendChild(congratsEl);
        scrollDown();

        setTimeout(() => {
          chat.style.opacity = '0';
          chat.style.transition = 'opacity .35s';
          setTimeout(() => {
            chat.style.display = 'none';

            const { steps, warnings, stories, future, docs, timeStr } = buildSummary();

            // Hero
            const heroEl = document.createElement('div');
            heroEl.className = 'summary-hero';
            heroEl.innerHTML = IS_SALES
              ? `
              <div class="hero-label">Sales Hand-off Pack</div>
              <div class="hero-title">Kickoff plan for ${answers.company || 'the customer'} 🎯</div>
              <div class="hero-sub">
                Use this in the Customer Ops kickoff. Every step maps to a question the customer will ask.
                ${answers.email ? `<br><span style="font-size:12px;opacity:.7">Customer contact: ${answers.email}</span>` : ''}
              </div>
              <div class="time-badge">⏱️ Estimated setup time: ${timeStr}</div>`
              : `
              <div class="hero-label">Your Setup Plan</div>
              <div class="hero-title">Ready to build on Tread 🚛</div>
              <div class="hero-sub">
                ${answers.company ? `<strong style="color:var(--text)">${answers.company}</strong> · ` : ''}
                Based on your answers, here's your personalised onboarding roadmap.
                ${answers.email ? `<br><span style="font-size:12px;opacity:.7">A copy has been noted for ${answers.email}</span>` : ''}
              </div>
              <div class="time-badge">⏱️ Estimated setup time: ${timeStr}</div>`;
            summary.appendChild(heroEl);

            // What success looks like
            const storySection = document.createElement('div');
            storySection.innerHTML = `<div class="section-label">What Success on Tread Looks Like</div>`;
            stories.forEach(s => {
              const item = document.createElement('div');
              item.className = 'story-item';
              item.innerHTML = `<div class="story-icon">${s.icon}</div><div class="story-text">${s.html}</div>`;
              storySection.appendChild(item);
            });
            summary.appendChild(storySection);

            // Intro video
            const videoEl = document.createElement('div');
            videoEl.className = 'video-section';
            videoEl.innerHTML = `
              <div class="video-intro">
                <strong>Watch first:</strong> This video walks through the key concepts end-to-end.
              </div>
              <div class="video-wrap">
                <iframe
                  src="https://drive.google.com/file/d/1Fnn0i-iS_yGXpSfs71qDN_9FiNWmS46f/preview"
                  allowfullscreen
                  allow="autoplay; fullscreen"
                  title="Tread Masterclass — Complete End-to-End Workflow"
                ></iframe>
              </div>
            `;
            summary.appendChild(videoEl);

            // Checklist
            const clSection = document.createElement('div');
            clSection.innerHTML = `<div class="section-label">${IS_SALES ? 'Kickoff Plan — in order' : 'Setup Steps'}</div>`;
            const cl = document.createElement('div');
            cl.className = 'checklist';
            steps.forEach((s, i) => {
              const item = document.createElement('div');
              item.className = 'check-item';
              item.innerHTML = `
                <div class="check-num">${i + 1}</div>
                <div class="check-content">
                  <div class="check-title">${s.title}</div>
                  <div class="check-desc">${s.desc}</div>
                  ${s.link ? `<a class="check-link" href="${s.link.href}" target="_blank" rel="noopener">
                    ${s.link.text} <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </a>` : ''}
                </div>`;
              cl.appendChild(item);
            });
            clSection.appendChild(cl);
            summary.appendChild(clSection);

            // Warnings
            const warnSection = document.createElement('div');
            warnSection.innerHTML = `<div class="section-label">Watch Out For</div>`;
            const warnList = document.createElement('div');
            warnList.className = 'warnings';
            warnings.slice(0, 3).forEach(w => {
              const item = document.createElement('div');
              item.className = 'warn-item';
              item.innerHTML = `<div class="warn-icon">${w.icon}</div><div class="warn-text">${w.html}</div>`;
              warnList.appendChild(item);
            });
            warnSection.appendChild(warnList);
            summary.appendChild(warnSection);

            // The future
            const futSection = document.createElement('div');
            futSection.innerHTML = `<div class="section-label">Where Tread Is Heading</div>`;
            const fut = document.createElement('div');
            fut.className = 'future-card';
            fut.innerHTML = future;
            futSection.appendChild(fut);
            summary.appendChild(futSection);

            // Divider
            summary.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));

            // Docs
            const docSection = document.createElement('div');
            docSection.innerHTML = `<div class="section-label">Learn More — docs.tread.ai</div>`;
            const grid = document.createElement('div');
            grid.className = 'doc-grid';
            docs.forEach(d => {
              const card = document.createElement('a');
              card.className = 'doc-card';
              card.href = d.href;
              card.target = '_blank';
              card.rel = 'noopener';
              card.innerHTML = `<div class="doc-card-icon">${d.icon}</div><div class="doc-card-title">${d.title}</div><div class="doc-card-sub">${d.sub}</div>`;
              grid.appendChild(card);
            });
            docSection.appendChild(grid);
            summary.appendChild(docSection);

            // Start over
            const btn = document.createElement('button');
            btn.className = 'start-over-btn';
            btn.textContent = '↩ Start over';
            btn.addEventListener('click', resetApp);
            summary.appendChild(btn);

            summary.classList.add('visible');
            try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
          }, 350);
        }, 1800);
      }, 900);
    }, 800);
  }

  /* ── Reset ───────────────────────────────────────────────── */
  function resetApp () {
    Object.keys(answers).forEach(k => delete answers[k]);
    currentQ = 0;
    currentSection = null;
    chat.innerHTML = '';
    summary.innerHTML = '';
    summary.classList.remove('visible');
    chat.style.cssText = '';
    updateProgress(0);
    askQuestion(0);
  }

  /* ── Boot ────────────────────────────────────────────────── */
  askQuestion(0);

})();
</script>
</body>
</html>
